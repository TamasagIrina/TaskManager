<div class="auth-container">
  
  <div class="toggle-buttons">
    <button (click)="switchToLogin()" [class.active]="logOrReg">Login</button>
    <button (click)="switchToRegister()" [class.active]="!logOrReg">Register</button>
  </div>

  @if (logOrReg) {
    <div class="form-wrapper">
      <h2>Login</h2>
      
      <div class="input-group">
        <label for="login-username">Email</label>
        <input type="email" id="login-username" #loginUsername placeholder="Enter email">
      </div>
      
      <div class="input-group">
        <label for="login-password">Password</label>
        <input type="password" id="login-password" #loginPassword placeholder="Enter password">
      </div>

      <button class="action-btn" (click)="login(loginUsername.value, loginPassword.value)">
        Sign In
      </button>
    </div>
  } 
  @else {
    <div class="form-wrapper">
      <h2>Create Account</h2>
      
      <div class="input-group">
        <label for="reg-username">Username</label>
        <input type="text" id="reg-username" #regUsername placeholder="Choose a username">
      </div>
      
      <div class="input-group">
        <label for="reg-email">Email</label>
        <input type="email" id="reg-email" #regEmail placeholder="address@email.com">
      </div>
      
      <div class="input-group">
        <label for="reg-password">Password</label>
        <input type="password" id="reg-password" #regPassword placeholder="Choose a password">
      </div>

      <div class="input-group">
        <label for="reg-birthdate">Date of Birth</label>
        <input type="date" id="reg-birthdate" #regBirthDate>
      </div>

      <button class="action-btn" (click)="register(regUsername.value, regEmail.value, regPassword.value, regBirthDate.value)">
        Sign Up
      </button>
    </div>
  }

  @if (authResponse()?.message) {
    <div class="success-message">
      <p>{{ authResponse()?.message }}</p>
    </div>
  }

</div>
