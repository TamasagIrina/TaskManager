<div class="page-container">
  <div class="page-header">
    <h1>Search Tasks</h1>
    <p>Find specific tasks using the filters below.</p>
  </div>


  <div class="search-panel">
    <div class="search-grid">
      

      <div class="form-group">
        <label >Subject</label>
        <input 
          type="text" 
          [(ngModel)]="searchSubject" 
          placeholder="e.g. Task Name" 
          class="form-control">
      </div>

  
      <div class="form-group">
        <label>Assigned To</label>
        <input 
          type="text" 
          [(ngModel)]="searchAssignee" 
          placeholder="e.g. ioana.pop" 
          class="form-control">
      </div>

      <div class="form-group">
        <label >Status</label>
        <select [(ngModel)]="searchStatus" class="form-control">
          <option value="">Any Status</option>
          @for (status of availableStatuses(); track status.statusName) {
            <option [value]="status.statusName">{{ status.statusName }}</option>
          }
        </select>
      </div>


      <div class="form-group">
        <label >Due Date (From)</label>
        <input 
          type="date" 
          [(ngModel)]="searchDate" 
          class="form-control">
      </div>
    </div>


    <div class="search-actions">
      <button class="btn btn-secondary" (click)="clearFilters()">Clear Filters</button>
      <button class="btn btn-primary" (click)="onSearch()">Search Tasks</button>
    </div>
  </div>

  @if (loading()) {
    <div class="state-container">
       <app-loading message="Searching..." variant="overlay"></app-loading>
    </div>
  } @else if (error()) {
    <div class="state-container">
      <p class="error-text">Error: {{ error() }}</p>
    </div>
  } @else {
    <div class="tasks-container">
      @for (task of tasks(); track task.taskId) {
        <app-task-card [task]="task"></app-task-card>
      } @empty {
        <div class="state-container">
          <p>No tasks found matching the filters.</p>
        </div>
      }
    </div>
  }
  
</div>
