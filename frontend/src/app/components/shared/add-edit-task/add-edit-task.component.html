<form [formGroup]="taskForm" (ngSubmit)="onSubmitTaskForm()">

    <div class="form-group">
        <label>Task Name:</label>
        <input type="text" formControlName="taskName" placeholder="Ex: Finalizare raport">
    </div>

    <div class="form-group">
        <label >Status:</label>
        <select formControlName="statusTypeId">
            @if (isLoadingStatusTypes()) {
                <option value="" disabled selected>Loading statuses...</option>
            } @else if (errorStatusTypes()) {
                <option value="" disabled selected>{{ errorStatusTypes() }}</option>
            } @else {
                <option value="" disabled selected>Choose a status...</option>
                @for (status of statusTypes(); track status.statusTypeId) {
                    <option [value]="status.statusTypeId">{{ status.statusName }}</option>
                }
            }
        </select>
    </div>

    <div class="form-group">
        <label >Assigned to:</label>
        <select formControlName="userId">
            @if (isLoadingUsers()) {
                <option [ngValue]="0" disabled selected>Loading users...</option>
            } @else if (errorUsers()) {
                <option [ngValue]="0" disabled selected>{{ errorUsers() }}</option>
            } @else {
                <option [ngValue]="0" disabled selected>Choose a user...</option>
                @for (user of users(); track user.userId) {
                    <option [value]="user.userId">{{user.userId}} - {{user.username}}</option>
                }
            }
        </select>
    </div>

    <div class="form-group">
        <label >Due Date:</label>
        <input type="date" formControlName="dueDate">
    </div>

    <div class="form-actions">
    
        
        <button type="submit" class="btn-submit" [disabled]="taskForm.invalid">
            @if (taskToEdit()) {
                Update
            } @else {
                Save
            }
        </button>
    </div>

</form>
